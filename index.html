<style>
/* ============================================================
   EDIT YOUR EVENTS IN THE <script id="data"> BLOCK AT THE BOTTOM
   ============================================================ */
:root{
  --ink:#0e1116;
  --paper:#e8e4da;
  --panel-bg:#1a1f27;
  --grid:#c9c3b6;
  --grid-hour:#b5ae9e;

  --must:#d92b3a;      /* red    */
  --want:#e08a1e;      /* amber  */
  --iffree:#5b7a9c;    /* slate  */

  --offsite:#2f6f5e;   /* green  */
  --ticketed:#2a4a7f;  /* purple */
  --free:#f5e9a8;      /* gap highlight */

  --row-h:34px;
  --gutter:156px;
  --daycols:5;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--paper);color:var(--ink);
  font-family:'Archivo',system-ui,-apple-system,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}

/* ---------- header ---------- */
header{padding:28px 24px 14px;border-bottom:2px solid var(--ink)}
h1{margin:0;font-size:clamp(22px,3.4vw,38px);font-weight:800;letter-spacing:-.02em;
  text-transform:uppercase}
h1 em{font-style:normal;color:var(--must)}
.sub{font-family:'Space Mono','SF Mono',Menlo,Consolas,monospace;font-size:12px;margin-top:6px;opacity:.7}

/* ---------- controls ---------- */
.controls{display:flex;flex-wrap:wrap;gap:16px;align-items:center;
  padding:12px 24px;border-bottom:1px solid var(--grid);
  font-family:'Space Mono','SF Mono',Menlo,Consolas,monospace;font-size:11px;text-transform:uppercase}
.controls label{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.controls input{accent-color:var(--must);cursor:pointer}
.spacer{flex:1}
.chip{display:inline-flex;align-items:center;gap:5px}
.sw{width:11px;height:11px;border-radius:2px;display:inline-block}

/* ---------- board ---------- */
.board{overflow-x:auto;padding:0 24px 40px}
.grid{min-width:1240px;position:relative}

.dayhead{display:grid;grid-template-columns:var(--gutter) repeat(var(--daycols),1fr);
  position:sticky;top:0;z-index:5;background:var(--paper);padding-top:14px}
.dayhead .lbl{}
.dayhead .d{border-left:1px solid var(--grid-hour);padding:0 0 6px 8px}
.dayhead .d b{display:block;font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:.04em}
.dayhead .d span{font-family:'Space Mono','SF Mono',Menlo,Consolas,monospace;font-size:10px;opacity:.6}
.hours{display:grid;grid-template-columns:var(--gutter) repeat(var(--daycols),1fr)}
.hours .lbl{}
.hours .hr{border-left:1px solid var(--grid-hour);display:grid;
  grid-template-columns:repeat(var(--slots),1fr);
  font-family:'Space Mono','SF Mono',Menlo,Consolas,monospace;font-size:10.5px;opacity:.55;padding-bottom:4px}
.hours .hr i{font-style:normal;border-left:1px solid transparent}
.hours .hr i:nth-child(2n+1){border-left-color:var(--grid)}

/* section label */
.sect{display:grid;grid-template-columns:var(--gutter) 1fr;align-items:end;
  margin-top:22px;border-bottom:2px solid var(--ink);padding-bottom:4px}
.sect h2{margin:0;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.14em}
.sect .note{font-family:'Space Mono','SF Mono',Menlo,Consolas,monospace;font-size:10px;opacity:.55;text-align:right}

/* a lane = one horizontal track */
.lane{display:grid;grid-template-columns:var(--gutter) repeat(var(--daycols),1fr);
  min-height:var(--row-h)}
.lane .name{font-family:'Space Mono','SF Mono',Menlo,Consolas,monospace;font-size:11.5px;
  padding:5px 10px 5px 0;text-align:right;line-height:1.25;
  border-bottom:1px solid var(--grid);display:flex;align-items:center;justify-content:flex-end}
.lane .day{position:relative;border-left:1px solid var(--grid-hour);
  border-bottom:1px solid var(--grid);min-height:var(--row-h)}
.hall{position:absolute;top:0;bottom:0;z-index:0;background:rgba(180,120,40,.075);
  border-left:1px solid rgba(180,120,40,.4);border-right:1px solid rgba(180,120,40,.4)}
.lane .day::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent calc(100%/var(--slots) - 1px),
    var(--grid) calc(100%/var(--slots) - 1px),var(--grid) calc(100%/var(--slots)))}

/* ---------- event bars ---------- */
.ev{position:absolute;top:4px;bottom:4px;border-radius:3px;
  font-size:12px;line-height:1;display:flex;align-items:center;gap:4px;
  padding:0 5px;overflow:hidden;white-space:nowrap;cursor:pointer;
  color:#fff;font-weight:600;z-index:2;transition:filter .12s,transform .12s}
.ev:hover{filter:brightness(1.15);transform:translateY(-1px);z-index:4}
.ev:focus-visible{outline:2px solid var(--ink);outline-offset:1px}
.ev.dim{opacity:.22}




.ev.offsite{background-color:var(--offsite);top:6px;bottom:6px}
.ev.ticketed{background-color:var(--ticketed)}
/* reservation required but not yet held: amber, dashed, urgent */
.ev.reservation{background-color:var(--ticketed)}
.ev.reservation:not(.held){outline:1px dashed #ffd79a;outline-offset:-1px}
/* walk-up = hatched */
.ev.walkup::before{content:'';position:absolute;inset:0;border-radius:inherit;
  pointer-events:none;
  background-image:repeating-linear-gradient(45deg,
    rgba(255,255,255,.20) 0 3px, rgba(255,255,255,0) 3px 6px)}
.ev .tick{font-family:'Space Mono','SF Mono',Menlo,Consolas,monospace;font-weight:700;opacity:.85}

/* giveaway pins sit ON the offsite bar */
.pin{position:absolute;top:50%;translate:-50% -50%;z-index:3;
  width:13px;height:13px;border-radius:50%;background:var(--free);
  border:2px solid var(--ink);cursor:pointer;font-size:0}
.pin:hover{scale:1.35}
.pin.unk{background:transparent;border:2px dashed var(--ink)}
/* open-ended: known start, unknown close — fades out to the right */
.ev.openend{-webkit-mask-image:linear-gradient(90deg,#000 0,#000 45%,transparent 100%);
  mask-image:linear-gradient(90deg,#000 0,#000 45%,transparent 100%)}
/* standby: reservation recommended, walk-up possible */
.ev.standby{background-color:var(--ticketed)}
/* lottery entered, outcome unknown */
.ev.lottery{background-color:#5f4a7a;outline:2px dotted rgba(255,255,255,.85);outline-offset:-2px}

/* nested programming sub-lane */
.lane.sub .name{opacity:.5;font-size:10.5px}
.lane[hidden]{display:none}
/* disclosure control on a parent lane's name */
.lane .name.toggle{padding:0;justify-content:flex-end}
.disc{all:unset;display:flex;align-items:center;gap:6px;justify-content:flex-end;
  width:100%;height:100%;padding:5px 10px 5px 0;cursor:pointer;
  font-family:inherit;font-size:inherit;color:inherit;text-align:right}
.disc:hover .lbl{text-decoration:underline}
.disc:focus-visible{outline:2px solid var(--ink);outline-offset:-2px}
.disc .caret{font-size:9px;opacity:.55;order:-1;width:10px;flex:none}
.disc .lbl{line-height:1.25}
.disc .cnt{font-size:9px;font-weight:700;background:#4a3d6b;color:#fff;
  border-radius:99px;padding:1px 5px;flex:none;line-height:1.4}
.lane.sub .day{min-height:26px}
.ev.prog{background-color:#4a3d6b;top:3px;bottom:3px;font-size:11px}
/* giveaway state */

.ev.gyes{box-shadow:0 3px 0 0 var(--free)}
/* published queue window, before doors */
.ev.queue{background:transparent;outline:1px dashed #8a5a1e;outline-offset:-1px;
  color:var(--ink);top:6px;bottom:6px;opacity:.85}
.ev.queue .tick{opacity:.7}
.badge.b-closed{background:#6b2020;color:#ffd7d7}
.badge.b-tag{background:#3f5f4a;color:#dbeade;text-transform:lowercase}
/* tag filter: dim, don't hide */
.lane.offsiterow .name{position:relative;cursor:grab;
  touch-action:none;                 /* we handle the gesture, not the browser */
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none}        /* no iOS text-selection popover */
.lane.offsiterow.dragging{opacity:.5}
.lane.offsiterow.dragging .name{cursor:grabbing;background:rgba(0,0,0,.05)}
.lane.offsiterow.dropafter{box-shadow:inset 0 -2px 0 var(--must,#d92b3a)}
/* while reordering, stop the page from scrolling under the finger */
body.reordering{overflow:hidden;-webkit-user-select:none;user-select:none}
body.reordering .board{overflow-x:hidden}
.grip{position:absolute;left:2px;top:50%;transform:translateY(-50%);
  opacity:.2;font-size:12px;letter-spacing:-1px;pointer-events:none;user-select:none}
.lane.offsiterow:hover .grip{opacity:.6}
@media (hover:none){                 /* touch devices: always show the handle */
  .grip{opacity:.45;font-size:14px}
  .lane .name{padding-left:16px}
}
#tagbar .hint{opacity:.4;margin-left:auto;font-size:9px}
@media (hover:none){ #tagbar .hint{font-size:0}
  #tagbar .hint::after{content:'long-press a row to reorder';font-size:9px} }
#resetorder{all:unset;cursor:pointer;font-size:9px;text-transform:uppercase;
  letter-spacing:.05em;opacity:.5;text-decoration:underline;margin-left:10px}
#resetorder:hover{opacity:1}
.lane.tagdim{opacity:.28}
.lane.tagdim .ev{filter:grayscale(.7)}
.badge.b-gyes{background:var(--free);color:#241f05}
.badge.b-gnone{background:#4a4740;color:#cfcbc2}
.badge.b-unk{background:#6e6a63;color:#eae7e0}
/* inside the convention center, not a true offsite */
.ev.onsite{background-color:#6b5a2e}
.lane.onsite .name:not(.toggle)::after{content:' ⌂';opacity:.55}
.lane.onsite .disc .lbl::after{content:' ⌂';opacity:.55}
/* exhibit hall reference rail */
.lane.hallrail .name{font-weight:800;text-transform:uppercase;letter-spacing:.06em;opacity:.75}
.lane.hallrail .day{min-height:26px}
.ev.hallbar{background-color:#8a5a1e;top:3px;bottom:3px;cursor:pointer}

/* conflict + free strips */
.strip .day{min-height:16px}




/* ---------- detail card ---------- */
#detail{position:fixed;left:0;top:0;width:300px;z-index:20;
  background:var(--panel-bg);color:#e9ecf1;border-radius:6px;padding:16px 18px;
  box-shadow:0 12px 40px rgba(0,0,0,.35);display:none}
#detail.on{display:block}
/* little arrow pointing back at the clicked bar */
#detail::after{content:'';position:absolute;width:10px;height:10px;
  background:var(--panel-bg);transform:rotate(45deg)}
#detail.below::after{top:-5px;left:var(--ax,24px)}
#detail.above::after{bottom:-5px;left:var(--ax,24px)}
@media(max-width:620px){
  /* on a phone, anchoring is pointless — dock it */
  #detail{left:10px!important;right:10px!important;top:auto!important;
    bottom:10px!important;width:auto!important}
  #detail::after{display:none}
}
#detail h3{margin:0 0 2px;font-size:15px;font-weight:800;line-height:1.2}
#detail .meta{font-family:'Space Mono','SF Mono',Menlo,Consolas,monospace;font-size:10px;opacity:.6;margin-bottom:10px}
#detail dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:11px}
#detail dt{font-family:'Space Mono','SF Mono',Menlo,Consolas,monospace;opacity:.5;text-transform:uppercase;font-size:9px;
  align-self:center}
#detail dd{margin:0;font-weight:600}
#detail .x{position:absolute;top:10px;right:12px;background:none;border:0;color:#fff;
  opacity:.4;font-size:18px;cursor:pointer;line-height:1}
#detail .x:hover{opacity:1}
.badge{display:inline-block;font-family:'Space Mono','SF Mono',Menlo,Consolas,monospace;font-size:9px;
  padding:2px 6px;border-radius:99px;font-weight:700;text-transform:uppercase}
.b-yes{background:#2f6f5e;color:#fff}
.b-no{background:#553;color:#e8dcae}

#detail dd a{color:#8fc7ff}
#detail dd a:hover{color:#bcdcff}
/* offsite with unpublished hours: spans full day, faded */
.ev.nohours{opacity:.72;outline:1px dashed rgba(255,255,255,.5);outline-offset:-1px}
/* estimated hours: dashed edge + query mark, reads as provisional */
.ev.est{outline:1px dashed rgba(255,255,255,.75);outline-offset:-1px}

.ev .q{margin-left:auto;font-family:'Space Mono','SF Mono',Menlo,Consolas,monospace;font-weight:700;
  opacity:.9;font-size:12px;padding-left:5px}
.b-est{background:#8a6d1f;color:#ffeec2}
.b-warn{background:#a8531c;color:#ffe3c4}
.b-mid{background:#3f6d8f;color:#dbeaf5}
.b-pick{background:#c9a227;color:#241f05}
/* action banner */
#tagbar:empty{display:none}
#tagbar{margin:12px 24px 0;display:flex;flex-wrap:wrap;gap:7px;align-items:center;
  font-family:'Space Mono','SF Mono',Menlo,Consolas,monospace;font-size:10px;
  text-transform:uppercase;letter-spacing:.04em}
#tagbar .lead{opacity:.5}
.tagbtn{all:unset;cursor:pointer;border:1px solid var(--line,#c9c3b6);border-radius:99px;
  padding:4px 11px;background:rgba(255,255,255,.4);display:inline-flex;gap:5px;align-items:center}
.tagbtn[aria-pressed="true"]{background:#3f5f4a;color:#fff;border-color:#3f5f4a}
.tagbtn:focus-visible{outline:2px solid var(--ink);outline-offset:1px}
.tagbtn .n{opacity:.6;font-weight:700}
#caveat{margin:14px 24px 0;padding:9px 13px;border-left:3px solid var(--ink);
  background:rgba(0,0,0,.045);font-size:11px;line-height:1.45}


@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

<script>
const D = JSON.parse(document.getElementById('data').textContent);
const H0 = D.startHour, H1 = D.endHour, SPAN = H1 - H0;
const NDAY = D.days.length;
const grid = document.getElementById('grid');
grid.style.setProperty('--daycols', NDAY);
document.documentElement.style.setProperty('--daycols', NDAY);
document.documentElement.style.setProperty('--slots', SPAN);

const pct = h => ((h - H0) / SPAN) * 100;
const fmt = h => {
  const hr = Math.floor(h), m = Math.round((h - hr) * 60);
  const ap = hr >= 12 ? 'pm' : 'am';
  const hh = hr % 12 === 0 ? 12 : hr % 12;
  return m ? `${hh}:${String(m).padStart(2,'0')}${ap}` : `${hh}${ap}`;
};

/* ---------- header rows ---------- */
let head = `<div class="dayhead"><div class="lbl"></div>`;
D.days.forEach(d => head += `<div class="d"><b>${d.name}</b><span>${d.date}</span></div>`);
head += `</div><div class="hours"><div class="lbl"></div>`;
D.days.forEach(() => {
  let hr = `<div class="hr">`;
  for (let h = H0; h < H1; h++) hr += `<i>${(h === H0 || h % 3 === 0) ? fmt(h) : ''}</i>`;
  head += hr + `</div>`;
});
head += `</div>`;
grid.innerHTML = head;

/* exhibit hall reference rail */
if (D.exhibitHall) {
  const R = document.createElement('div');
  R.className = 'lane hallrail';
  R.innerHTML = `<div class="name">${D.exhibitHall.label || 'Exhibit Hall'}</div>`;
  for (let i = 0; i < NDAY; i++) {
    const c = document.createElement('div');
    c.className = 'day';
    const h = (D.exhibitHall.hours || {})[i];
    if (h) {
      const b = document.createElement('button');
      b.className = 'ev hallbar';
      b.style.left = pct(h[0]) + '%';
      b.style.width = (pct(h[1]) - pct(h[0])) + '%';
      b.innerHTML = `<span class="tick">${fmt(h[0])}–${fmt(h[1])}</span>`;
      b.onclick = () => show(D.exhibitHall.label || 'Exhibit Hall',
        `${D.days[i].name} · ${fmt(h[0])}–${fmt(h[1])}`,
        [['Note', 'Convention floor hours. Shaded on every lane below.'],
         ...(D.exhibitHall.link ? [['Source',
           `<a href="${D.exhibitHall.link}" target="_blank" rel="noopener">comic-con.org ↗</a>`]] : [])]);
      c.appendChild(b);
    }
    R.appendChild(c);
  }
  grid.appendChild(R);
}

/* ---------- helpers ---------- */
const HALL = (D.exhibitHall && D.exhibitHall.hours) || {};
function lane(name, cls = '') {
  const l = document.createElement('div');
  l.className = 'lane ' + cls;
  l.innerHTML = `<div class="name">${name}</div>`;
  const cells = [];
  for (let i = 0; i < NDAY; i++) {
    const c = document.createElement('div');
    c.className = 'day';
    const h = HALL[i];
    if (h) {                                  // shade the hours the hall is open
      const sh = document.createElement('div');
      sh.className = 'hall';
      sh.style.left = pct(h[0]) + '%';
      sh.style.width = (pct(h[1]) - pct(h[0])) + '%';
      c.appendChild(sh);
    }
    l.appendChild(c);
    cells.push(c);
  }
  return { el: l, cells };
}
function section(title, note) {
  const s = document.createElement('div');
  s.className = 'sect';
  s.innerHTML = `<h2>${title}</h2><div class="note">${note}</div>`;
  grid.appendChild(s);
}

/* ---------- detail card ---------- */
const det = document.getElementById('detail');
let clickPt = null;
document.addEventListener('click', e => {
  if (det.contains(e.target)) return;             // don't re-anchor on the card itself
  if (e.clientX || e.clientY) { clickPt = { x: e.clientX, y: e.clientY }; return; }
  const r = e.target.getBoundingClientRect();     // keyboard / synthetic click
  clickPt = { x: r.left + r.width / 2, y: r.bottom };
}, true);
function show(title, meta, rows) {
  document.getElementById('d-title').textContent = title;
  document.getElementById('d-meta').textContent = meta;
  document.getElementById('d-body').innerHTML =
    rows.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');
  det.classList.add('on');
  place();
}

/* put the card next to the click, clamped to the viewport */
function place() {
  if (!clickPt || window.innerWidth <= 620) {
    det.classList.remove('above', 'below');
    det.style.cssText = '';                       // fall back to the CSS default
    return;
  }
  det.classList.remove('above', 'below');
  det.style.left = '0px'; det.style.top = '0px';  // measure unclamped
  const r = det.getBoundingClientRect();
  const w = r.width, h = r.height, M = 12, GAP = 14;

  // prefer below the click; flip above if it would overflow
  let top = clickPt.y + GAP, cls = 'below';
  if (top + h > window.innerHeight - M) {
    top = clickPt.y - h - GAP;
    cls = 'above';
  }
  top = Math.max(M, Math.min(top, window.innerHeight - h - M));

  // centre horizontally on the click, then clamp
  let left = clickPt.x - w / 2;
  left = Math.max(M, Math.min(left, window.innerWidth - w - M));

  det.style.left = left + 'px';
  det.style.top = top + 'px';
  det.classList.add(cls);
  // arrow points back at the click, kept inside the card's rounded corners
  det.style.setProperty('--ax', Math.max(14, Math.min(clickPt.x - left, w - 24)) + 'px');
}
window.addEventListener('resize', () => { if (det.classList.contains('on')) place(); });
let lastY = window.scrollY;
window.addEventListener('scroll', () => {          // close only on vertical page scroll
  if (Math.abs(window.scrollY - lastY) > 4) det.classList.remove('on');
  lastY = window.scrollY;
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') det.classList.remove('on'); });
function srcRows(o){
  const ls = o.links || (o.link ? [o.link] : []);
  if(!ls.length) return [];
  return [['Source', ls.map((u,i)=>{
    let host='source';
    try{ host = new URL(u).hostname.replace(/^www\./,''); }catch(e){}
    return `<a href="${u}" target="_blank" rel="noopener">${host} ↗</a>`;
  }).join('<br>')]];
}

/* ============ OFFSITES ============ */
section('Offsites', '⌂ = inside convention center · pins = giveaways · hatched = walk-up');
D.offsites.forEach(o => {
  const L = lane(o.title, o.onsite ? 'onsite' : '');
  if ((o.tags || []).length) L.el.dataset.tags = o.tags.join(' ');
  L.el.classList.add('offsiterow');
  L.el.dataset.title = o.title;
  // access: 'ticketed' | 'reservation' | 'walkup'  (legacy: ticketed:true/false)
  const acc = o.access || (o.ticketed ? 'ticketed' : 'walkup');
  const sched = o.followsHall
    ? Object.entries(HALL)
        .filter(([d]) => !o.hallDays || o.hallDays.includes(+d))
        .map(([d, hr]) => [+d, hr[0], hr[1]])
    : o.hours
    ? Object.entries(o.hours).map(([d, hr]) => [+d, hr[0], hr[1]])
    : (o.days || []).map(d => [d, o.start, o.end]);

  sched.forEach(([d, st, en]) => {
    const openEnded = (st != null && en == null);   // known open, unknown close
    const known = (st != null && en != null);
    const s = st != null ? st : H0;
    const e = en != null ? en : H1;
    const b = document.createElement('button');
    b.className = `ev offsite ${acc}`
      + (st == null ? ' nohours' : '') + (openEnded ? ' openend' : '')
      + (o.estimated ? ' est' : '')
      + (o.onsite ? ' onsite' : '')
      + ((o.giveaway === 'yes' || (o.pins || []).some(p => p.day === d)) ? ' gyes' : '');
    b.style.left = pct(s) + '%';
    b.style.width = (pct(e) - pct(s)) + '%';
    b.innerHTML = `<span class="tick">${
        known ? fmt(s) + '–' + fmt(e)
      : openEnded ? fmt(s) + (o.closesWhen ? '– ' + o.closesWhen : '– close TBA')
      : 'hours TBA'}</span>`
      + ((o.cap && o.cap.days.includes(d)) ? `<span class="q">⏳</span>` : '')
      + (o.badgeRequired ? `<span class="q">🎟</span>` : '')
      + (o.closesWhen ? `<span class="q">⌛</span>` : '')
      + ((o.tags || []).includes('food') ? `<span class="q">🍽</span>` : '')
      + (o.giveaway === 'unknown' ? `<span class="q" title="Giveaway not announced">❓</span>` : '')
      + (o.giveaway === 'yes' ? `<span class="q">🎁</span>` : '');
    b.onclick = () => show(o.title,
      `${D.days[d].name} · ${known ? fmt(s) + '–' + fmt(e)
        : openEnded ? 'opens ' + fmt(s) + (o.closesWhen ? ' · until ' + o.closesWhen : ' · close not stated')
        : 'hours not published'}`, [
      ['Access',
        acc === 'ticketed' ? `<span class="badge b-yes">Ticketed</span> ${o.confirmation || ''}`
      : acc === 'reservation' ? (o.confirmation
          ? `<span class="badge b-yes">Reserved</span> ${o.confirmation}`
          : `<span class="badge b-warn">Reservation needed</span>`)
      : acc === 'standby' ? `<span class="badge b-mid">Reserve or standby</span>`
      : acc === 'lottery' ? `<span class="badge b-pick">Lottery entry</span>`
      : `<span class="badge b-no">Walk-up</span>`],
      ...(o.duration ? [['Duration', `~${o.duration} min`]] : []),
      ...(o.cap && o.cap.days.includes(d)
        ? [['Capped', `<span class="badge b-warn">First ${o.cap.n}</span> ${o.cap.what}`]] : []),
      ...(o.badgeRequired
        ? [['Badge', `<span class="badge b-mid">Partly badge-gated</span> ${o.badgeRequired}`]] : []),
      ...(o.queueOpens != null
        ? [['Queue', `<span class="badge b-warn">Opens ${fmt(o.queueOpens)}</span> ${o.queueNote || ''}`]] : []),
      ...(o.applicationClosed
        ? [['Applications', `<span class="badge b-closed">Closed</span> ${o.applicationClosed}`]] : []),
      ...(o.ageLimit ? [['Age',
        `<span class="badge b-warn">${/18\s*\+/.test(o.ageLimit) ? '18+' : '21+'}</span> ${o.ageLimit}`]] : []),
      ...((o.tags || []).length
        ? [['Tags', o.tags.map(t => `<span class="badge b-tag">${t}</span>`).join(' ')]] : []),
      ...(o.giveaway
        ? [['Giveaway',
            (o.giveaway === 'yes'   ? `<span class="badge b-gyes">Yes</span>`
           : o.giveaway === 'none'  ? `<span class="badge b-gnone">None</span>`
           :                          `<span class="badge b-unk">Not announced</span>`)
            + ' ' + (o.giveawayNote || (o.giveaway === 'unknown'
                ? 'No giveaway details published.' : ''))]] : []),
      ...(o.ticketedInside ? [['Inside',
        `<span class="badge b-warn">Ticketed play</span> ${o.ticketedInside}`]] : []),
      ...(acc === 'reservation' && !o.confirmation && o.reservationOpens
        ? [['Opens', `<b style="color:#ffcf6b">${o.reservationOpens}</b>`]] : []),
      ...(acc === 'reservation' && o.reservationUrl
        ? [['Book at', `<a href="${o.reservationUrl}" target="_blank" rel="noopener">${o.reservationUrl.replace(/^https?:\/\//,'')} ↗</a>`]] : []),
      ['Hours', o.estimated ? `<span class="badge b-est">Estimated</span>`
        : o.followsHall ? `<span class="badge b-mid">Follows exhibit hall</span>`
        : o.closesWhen ? `<span class="badge b-warn">Opens ${fmt(s)}, until ${o.closesWhen}</span>`
        : `<span class="badge b-yes">Confirmed</span>`],
      ['Location', o.location || '—'],
      ...(o.onsite
        ? [['Venue', `<span class="badge b-mid">Inside convention center</span>`]]
        : [['Walk', o.walk || '—']]),
      ...(o.note ? [['Note', o.note]] : []),
      ...(o.pins || []).filter(p => p.day === d).map(p => [fmt(p.t), p.what]),
      ...srcRows(o)
    ]);
    // published queue time, drawn as a lead-in before doors
    if (o.queueOpens != null && o.queueOpens < s) {
      const q = document.createElement('button');
      q.className = 'ev queue';
      q.style.left = pct(o.queueOpens) + '%';
      q.style.width = (pct(s) - pct(o.queueOpens)) + '%';
      q.innerHTML = `<span class="tick">${fmt(o.queueOpens)} queue</span>`;
      q.onclick = ev => { ev.stopPropagation(); show(o.title + ' — queue',
        `${D.days[d].name} · ${fmt(o.queueOpens)}–${fmt(s)}`,
        [['Queue', o.queueNote || 'Queue opens before doors.'],
         ['Doors', fmt(s)], ...srcRows(o)]); };
      L.cells[d].appendChild(q);
    }
    L.cells[d].appendChild(b);
  });
  // nested programming -> collapsed sub-lane, toggled from the parent's name
  const emitProgram = () => {
    if (!(o.programs && o.programs.length)) return;
    const n = o.programs.length;
    const P = lane('', 'sub');
    P.el.hidden = true;
    o.programs.forEach(pr => {
      const pb = document.createElement('button');
      pb.className = 'ev prog';
      pb.style.left = pct(pr.start) + '%';
      pb.style.width = (pct(pr.end) - pct(pr.start)) + '%';
      pb.innerHTML = `<span class="tick">${fmt(pr.start)}</span>${pr.title}`;
      pb.onclick = e => { e.stopPropagation(); show(pr.title,
        `${D.days[pr.day].name} · ${fmt(pr.start)}–${fmt(pr.end)}`,
        [['Part of', o.title], ['Location', o.location || '—'], ...srcRows(o)]); };
      P.cells[pr.day].appendChild(pb);
    });
    grid.appendChild(P.el);

    // turn the parent's lane name into a disclosure control
    const nm = L.el.querySelector('.name');
    nm.classList.add('toggle');
    nm.innerHTML = `<button class="disc" aria-expanded="false"
        aria-label="Show ${n} programming items for ${o.title}">
        <span class="caret">▸</span><span class="lbl">${o.title}</span>
        <span class="cnt">${n}</span></button>`;
    const btn = nm.querySelector('.disc');
    btn.onclick = () => {
      const open = P.el.hidden;
      P.el.hidden = !open;
      btn.setAttribute('aria-expanded', String(open));
      btn.querySelector('.caret').textContent = open ? '▾' : '▸';
    };
  };

  (o.pins || []).forEach(p => {
    const dot = document.createElement('button');
    dot.className = 'pin' + (p.unknownTime ? ' unk' : '');
    dot.style.left = pct(p.t) + '%';
    dot.title = p.unknownTime ? `time TBA — ${p.what}` : `${fmt(p.t)} — ${p.what}`;
    dot.onclick = e => { e.stopPropagation(); show(o.title,
      `${D.days[p.day].name} · ${p.unknownTime ? 'time not announced' : fmt(p.t)}`,
      [['Drop', p.what], ['Location', o.location || '—'], ...srcRows(o)]); };
    L.cells[p.day].appendChild(dot);
  });
  grid.appendChild(L.el);
  emitProgram();
  { const g = document.createElement('span'); g.className = 'grip'; g.textContent = '⠿';
    L.el.querySelector('.name').appendChild(g); }
});

/* ============ TAG FILTER ============ */
{
  const counts = {};
  D.offsites.forEach(o => (o.tags || []).forEach(t => counts[t] = (counts[t] || 0) + 1));
  const tags = Object.keys(counts).sort();
  const bar = document.getElementById('tagbar');
  if (tags.length) {
    const active = new Set();
    bar.innerHTML = `<span class="lead">Filter:</span>` + tags.map(t =>
      `<button class="tagbtn" data-tag="${t}" aria-pressed="false">${t}<span class="n">${counts[t]}</span></button>`
    ).join('') + `<button class="tagbtn" data-tag="__all" aria-pressed="false">clear</button>`
      + `<span class="hint">drag rows to reorder</span>`
      + `<button id="resetorder" title="Restore the default row order">reset order</button>`;

    const apply = () => {
      document.querySelectorAll('.lane').forEach(l => {
        if (l.dataset.tags) {
          const has = l.dataset.tags.split(' ').some(t => active.has(t));
          l.classList.toggle('tagdim', active.size > 0 && !has);
        } else if (!l.classList.contains('sub') && !l.classList.contains('hallrail')) {
          l.classList.toggle('tagdim', active.size > 0);
        }
      });
    };
    bar.querySelectorAll('.tagbtn').forEach(b => {
      b.onclick = () => {
        const t = b.dataset.tag;
        if (t === '__all') active.clear();
        else if (active.has(t)) active.delete(t); else active.add(t);
        bar.querySelectorAll('.tagbtn').forEach(x =>
          x.setAttribute('aria-pressed', String(x.dataset.tag !== '__all' && active.has(x.dataset.tag))));
        apply();
      };
    });
  }
}


/* ============ DRAG TO REORDER — pointer events, works on touch ============ */
{
  const KEY = 'sdcc26.laneOrder.v1';
  const grid = document.getElementById('grid');
  const LONGPRESS = 220;      // ms before a touch becomes a drag
  const SLOP = 8;             // px of movement that cancels the long-press

  const parents = () => [...grid.querySelectorAll('.lane.offsiterow')];
  const subOf = el => (el.nextElementSibling &&
    el.nextElementSibling.classList.contains('sub')) ? el.nextElementSibling : null;

  const save = () => {
    try { localStorage.setItem(KEY,
      JSON.stringify(parents().map(l => l.dataset.title))); } catch (e) {}
  };
  const restore = () => {
    let want; try { want = JSON.parse(localStorage.getItem(KEY) || 'null'); } catch (e) {}
    if (!Array.isArray(want) || !parents().length) return;
    const by = {}; parents().forEach(l => by[l.dataset.title] = l);
    want.forEach(t => {
      const l = by[t]; if (!l) return;
      const sub = subOf(l);
      grid.appendChild(l); if (sub) grid.appendChild(sub);
      delete by[t];
    });
    Object.values(by).forEach(l => {
      const sub = subOf(l); grid.appendChild(l); if (sub) grid.appendChild(sub);
    });
  };

  let drag = null;            // {lane, sub, timer, startY, active, pid}

  const clearMarks = () => parents().forEach(l => l.classList.remove('dropafter'));

  const begin = () => {
    if (!drag) return;
    drag.active = true;
    drag.lane.classList.add('dragging');
    document.body.classList.add('reordering');
    if (navigator.vibrate) navigator.vibrate(12);
  };

  const laneAt = (x, y) => {
    const el = document.elementFromPoint(x, y);
    return el ? el.closest('.lane.offsiterow') : null;
  };

  const moveTo = over => {
    if (!over || over === drag.lane) return;
    const after = over.compareDocumentPosition(drag.lane) & Node.DOCUMENT_POSITION_PRECEDING;
    const ref = after ? (subOf(over) || over).nextSibling : over;
    grid.insertBefore(drag.lane, ref);
    if (drag.sub) grid.insertBefore(drag.sub, drag.lane.nextSibling);
  };

  const finish = () => {
    if (!drag) return;
    clearTimeout(drag.timer);
    if (drag.active) {
      drag.lane.classList.remove('dragging');
      document.body.classList.remove('reordering');
      save();
    }
    clearMarks();
    drag = null;
  };

  grid.addEventListener('pointerdown', e => {
    if (e.button != null && e.button !== 0) return;          // left click / any touch
    const name = e.target.closest('.name');
    const lane = e.target.closest('.lane.offsiterow');
    if (!lane || !name) return;                              // grab by the label only
    if (e.target.closest('.disc')) return;                   // let the disclosure toggle work

    drag = { lane, sub: subOf(lane), startY: e.clientY, startX: e.clientX,
             active: false, pid: e.pointerId, timer: null };

    if (e.pointerType === 'mouse') { begin(); }              // mouse drags immediately
    else { drag.timer = setTimeout(begin, LONGPRESS); }      // touch waits, so scrolling still works
  });

  grid.addEventListener('pointermove', e => {
    if (!drag || e.pointerId !== drag.pid) return;
    if (!drag.active) {
      // moved before the long-press fired -> it was a scroll, not a drag
      if (Math.abs(e.clientY - drag.startY) > SLOP ||
          Math.abs(e.clientX - drag.startX) > SLOP) { clearTimeout(drag.timer); drag = null; }
      return;
    }
    e.preventDefault();
    try { drag.lane.setPointerCapture(drag.pid); } catch (err) {}
    const over = laneAt(e.clientX, e.clientY);
    clearMarks();
    if (over && over !== drag.lane) { over.classList.add('dropafter'); moveTo(over); }
  });

  ['pointerup', 'pointercancel'].forEach(t =>
    grid.addEventListener(t, e => { if (!drag || e.pointerId !== drag.pid) return; finish(); }));
  window.addEventListener('blur', finish);

  document.getElementById('resetorder')?.addEventListener('click', () => {
    try { localStorage.removeItem(KEY); } catch (e) {}
    location.reload();
  });

  restore();
}
</script>
</body>
